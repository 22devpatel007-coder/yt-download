
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube MP3 Downloader</title>
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
    padding: 40px 16px 80px;
}

.wrap { max-width: 620px; margin: 0 auto; }

h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
.tagline { font-size: 13px; color: #888; margin-bottom: 28px; }

.card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
}

/* ── Input ── */
.field { margin-bottom: 14px; }
label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: 500; }
input[type="url"] {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 5px;
    padding: 10px 12px;
    font-size: 14px;
    color: #222;
    outline: none;
    transition: border-color .15s;
    background: #fafafa;
}
input[type="url"]:focus { border-color: #555; background: #fff; }
input[type="url"]::placeholder { color: #bbb; }

/* ── Buttons ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.btn {
    border: 1px solid #ccc;
    border-radius: 5px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: #333;
    transition: background .15s, border-color .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
.btn:hover:not(:disabled) { background: #f0f0f0; border-color: #aaa; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:active:not(:disabled) { background: #e8e8e8; }

/* Primary — black fill */
.btn-primary {
    background: #222;
    color: #fff;
    border-color: #222;
    flex: 1;
}
.btn-primary:hover:not(:disabled) { background: #333; border-color: #333; }
.btn-primary:active:not(:disabled) { background: #111; }

/* Download row — two equal download buttons */
.dl-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
}

/* Spinner */
.spin {
    width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
    flex-shrink: 0;
}
.btn:not(.btn-primary) .spin { border-color: rgba(0,0,0,.15); border-top-color: #555; }
.btn.loading .spin { display: inline-block; }
.btn.loading .lbl  { display: none; }

/* ── Quality ── */
#qualitySection { display: none; margin-bottom: 14px; }
.section-label { font-size: 12px; color: #555; font-weight: 500; margin-bottom: 7px; }
.quality-options { display: flex; gap: 6px; flex-wrap: wrap; }
.qbtn {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    background: #fafafa;
    color: #555;
    transition: all .15s;
}
.qbtn:hover { border-color: #888; color: #222; }
.qbtn.active { border-color: #222; background: #222; color: #fff; }

/* ── Count result ── */
.count-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f9f9f9;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: #333;
}
.count-num {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    line-height: 1;
}
.count-label { font-size: 12px; color: #888; margin-top: 1px; }

/* ── Divider ── */
hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }

/* ── Preview ── */
#previewSection { display: none; margin-bottom: 14px; }
.preview-row {
    display: flex; gap: 12px; align-items: center;
    background: #f9f9f9; border: 1px solid #e8e8e8;
    border-radius: 6px; padding: 12px;
}
.preview-thumb {
    width: 56px; height: 56px; border-radius: 4px;
    object-fit: cover; flex-shrink: 0; background: #eee;
}
.preview-thumb-ph {
    width: 56px; height: 56px; border-radius: 4px;
    background: #eee; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
}
.preview-info { flex: 1; min-width: 0; }
.preview-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preview-meta  { font-size: 12px; color: #888; margin-top: 2px; }
.tag {
    display: inline-block; font-size: 11px;
    background: #eee; border-radius: 3px;
    padding: 2px 7px; color: #555; margin-top: 4px;
}

/* ── Progress ── */
#progressSection { display: none; margin-bottom: 6px; }
.progress-label-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
    font-size: 12px; color: #555;
}
.progress-bar-bg {
    height: 6px; background: #eee;
    border-radius: 3px; overflow: hidden; margin-bottom: 5px;
}
.progress-bar-fill {
    height: 100%; background: #222;
    border-radius: 3px; width: 0%;
    transition: width .35s ease;
}
.progress-detail { font-size: 11px; color: #aaa; }

/* mode badge shown inside progress */
.mode-badge {
    display: inline-block;
    font-size: 10px;
    background: #eee;
    border-radius: 3px;
    padding: 1px 6px;
    color: #777;
    margin-left: 6px;
    vertical-align: middle;
}

/* ── Warnings ── */
#warningsLog {
    display: none; margin-top: 10px;
    border: 1px solid #fcc; border-radius: 5px;
    background: #fff9f9; padding: 10px 12px;
    font-size: 12px; color: #b44;
    max-height: 90px; overflow-y: auto;
}
#warningsLog p { margin-bottom: 2px; }

/* ── Track section ── */
#trackSection { display: none; margin-top: 18px; }
.track-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
    flex-wrap: wrap; gap: 8px;
}
.track-heading { font-size: 13px; font-weight: 600; color: #333; }

/* ZIP download buttons in track header */
.zip-btn-group { display: flex; gap: 6px; }
.btn-zip {
    display: inline-flex; align-items: center; gap: 5px;
    border: 1px solid #ccc; border-radius: 5px;
    padding: 7px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; background: #fff; color: #333;
    transition: all .15s; white-space: nowrap;
}
.btn-zip:hover { background: #f0f0f0; }
.btn-zip.primary { background: #222; color: #fff; border-color: #222; }
.btn-zip.primary:hover { background: #333; }

.track-list { display: flex; flex-direction: column; gap: 1px; }
.track-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 5px; transition: background .1s;
}
.track-item:hover { background: #f8f8f8; }

.track-num  { font-size: 11px; color: #bbb; min-width: 22px; text-align: right; flex-shrink: 0; }
.track-cover {
    width: 36px; height: 36px; border-radius: 3px;
    flex-shrink: 0; background: #eee;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; overflow: hidden;
}
.track-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { font-size: 11px; color: #aaa; }
.track-dur  { font-size: 11px; color: #bbb; flex-shrink: 0; }
.btn-dl {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid #ddd; border-radius: 4px; padding: 5px 10px;
    font-size: 11px; cursor: pointer; background: #fafafa;
    color: #555; white-space: nowrap; flex-shrink: 0; transition: all .15s;
}
.btn-dl:hover { background: #f0f0f0; border-color: #aaa; color: #222; }

/* ── Toast ── */
#toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #222; color: #fff; border-radius: 5px;
    padding: 9px 18px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all .25s;
    white-space: nowrap; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err  { background: #b44; }
#toast.ok   { background: #2a7; }

footer { margin-top: 24px; font-size: 11px; color: #bbb; text-align: center; }

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 520px) {
    .dl-row { grid-template-columns: 1fr; }
    .track-dur { display: none; }
    .zip-btn-group { width: 100%; }
    .btn-zip { flex: 1; justify-content: center; }
}
    </style>
</head>
<body>

<div class="wrap">

    <h1>YouTube MP3 Downloader</h1>
    <p class="tagline">Download videos or playlists as MP3 files.</p>

    <div class="card">

        <div class="field">
            <label for="urlInput">YouTube URL</label>
            <input type="url" id="urlInput"
                   placeholder="https://www.youtube.com/watch?v=..."
                   autocomplete="off" spellcheck="false" />
        </div>

        <!-- Preview + Quality + Count row -->
        <div class="btn-row">
            <button class="btn" id="btnPreview" onclick="handlePreview()">
                <div class="spin"></div><span class="lbl">Preview</span>
            </button>
            <button class="btn" id="btnFormats" onclick="handleFormats()">
                <div class="spin"></div><span class="lbl">Quality</span>
            </button>
            <button class="btn" id="btnCount" onclick="handleCount()">
                <div class="spin"></div><span class="lbl">Count Songs</span>
            </button>
        </div>

        <!-- Song count result -->
        <div id="countResult" style="display:none;margin-bottom:14px;"></div>

        <!-- Quality picker -->
        <div id="qualitySection">
            <div class="section-label">Bitrate</div>
            <div class="quality-options" id="qualityGrid"></div>
        </div>

        <!-- Preview -->
        <div id="previewSection"></div>

        <hr style="margin: 14px 0 14px;">

        <!-- Download section label -->
        <div class="section-label" style="margin-bottom:8px;">Download</div>

        <!-- Two separate download buttons -->
        <div class="dl-row">
            <button class="btn btn-primary" id="btnDownloadZip" onclick="handleDownload('structured')">
                <div class="spin"></div>
                <span class="lbl">↓ ZIP with Covers</span>
            </button>
            <button class="btn btn-primary" id="btnDownloadFlat" onclick="handleDownload('flat')">
                <div class="spin"></div>
                <span class="lbl">↓ MP3 Files Only</span>
            </button>
        </div>

        <!-- Explanatory note -->
        <div style="font-size:11px;color:#aaa;margin-bottom:14px;line-height:1.5;">
            <b style="color:#888;">ZIP with Covers</b> — includes cover art, metadata &amp; manifest.json &nbsp;·&nbsp;
            <b style="color:#888;">MP3 Files Only</b> — plain MP3s in a flat ZIP, no extras
        </div>

        <!-- Progress -->
        <div id="progressSection">
            <div class="progress-label-row">
                <span id="progLabel">Downloading…</span>
                <span id="progPct">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progBar"></div>
            </div>
            <div class="progress-detail" id="progDetail"></div>
        </div>

        <!-- Warnings -->
        <div id="warningsLog"></div>

        <!-- Track list (shown after download completes) -->
        <div id="trackSection">
            <hr />
            <div class="track-header">
                <span class="track-heading" id="trackHeading">Downloaded Tracks</span>
                <div class="zip-btn-group">
                    <button class="btn-zip" id="btnZipAlt" onclick="downloadZipAlt()" style="display:none;">
                        ↓ Other ZIP
                    </button>
                    <button class="btn-zip primary" id="btnZip" onclick="downloadZip()">
                        ↓ Download ZIP
                    </button>
                </div>
            </div>
            <div class="track-list" id="trackList"></div>
        </div>

    </div>

    <footer>For personal use only · Respect copyright laws</footer>
</div>

<div id="toast"></div>

<script>
/* ── State ── */
let selectedQuality = '192';
let activeEvt       = null;
let isDownloading   = false;
let currentSession  = null;   // { sessionId, fileName, flatFileName?, albumName, tracks[], lastMode }

/* ── Toast ── */
let toastTimer = null;
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (type === 'error' ? ' err' : type === 'success' ? ' ok' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3200);
}

/* ── Helpers ── */
function esc(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
}

function setLoading(id, on) {
    const b = document.getElementById(id);
    if (!b) return;
    b.classList.toggle('loading', on);
    b.disabled = on;
}

function lockAll(lock) {
    ['btnPreview','btnFormats','btnCount','btnDownloadZip','btnDownloadFlat'].forEach(id => {
        const b = document.getElementById(id);
        if (b) b.disabled = lock;
    });
}

function getUrl() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { toast('Paste a YouTube URL first.', 'error'); return null; }
    try {
        const p  = new URL(url);
        const ok = ['youtube.com','www.youtube.com','youtu.be','m.youtube.com','music.youtube.com'];
        if (!ok.includes(p.hostname)) { toast('Only YouTube URLs are supported.', 'error'); return null; }
    } catch { toast('Invalid URL.', 'error'); return null; }
    return url;
}

/* ── Count Songs ── */
async function handleCount() {
    const url = getUrl(); if (!url) return;
    setLoading('btnCount', true);
    const box = document.getElementById('countResult');
    box.style.display = 'none';
    try {
        const res  = await fetch('/preview-playlist', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Failed');
        const data = await res.json();
        const label = data.isPlaylist
            ? `songs in "${esc(data.title)}"`
            : `song — single video`;
        box.innerHTML = `<div class="count-box">
            <div class="count-num">${data.trackCount}</div>
            <div class="count-label">${label}</div>
        </div>`;
        box.style.display = 'block';
    } catch (err) {
        toast(err.message || 'Could not count songs.', 'error');
    } finally {
        setLoading('btnCount', false);
    }
}

/* ── Preview ── */
async function handlePreview() {
    const url = getUrl(); if (!url) return;
    setLoading('btnPreview', true);
    try {
        const res  = await fetch('/preview-playlist', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Failed');
        renderPreview(await res.json());
    } catch (err) {
        toast(err.message || 'Preview failed.', 'error');
    } finally {
        setLoading('btnPreview', false);
    }
}

function renderPreview(d) {
    const thumb = d.thumbnail
        ? `<img class="preview-thumb" src="${esc(d.thumbnail)}" alt="" onerror="this.style.display='none'">`
        : `<div class="preview-thumb-ph">♪</div>`;
    const tag = d.isPlaylist
        ? `<span class="tag">Playlist · ${d.trackCount} tracks</span>`
        : `<span class="tag">Single track</span>`;
    const s = document.getElementById('previewSection');
    s.innerHTML = `<hr><div class="preview-row">
        ${thumb}
        <div class="preview-info">
            <div class="preview-title">${esc(d.title)}</div>
            <div class="preview-meta">${esc(d.artist)}</div>
            ${tag}
        </div>
    </div>`;
    s.style.display = 'block';
}

/* ── Formats / Quality ── */
async function handleFormats() {
    const url = getUrl(); if (!url) return;
    setLoading('btnFormats', true);
    try {
        const res = await fetch('/formats', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Failed');
        renderQuality(await res.json());
    } catch (err) {
        toast(err.message || 'Could not load quality options.', 'error');
    } finally {
        setLoading('btnFormats', false);
    }
}

function renderQuality(formats) {
    const grid = document.getElementById('qualityGrid');
    grid.innerHTML = '';
    formats.forEach(f => {
        const b = document.createElement('button');
        b.className = 'qbtn' + (String(f.abr) === selectedQuality ? ' active' : '');
        b.textContent = `${f.abr} kbps${f.size !== 'Size varies' ? ' · ' + f.size : ''}`;
        b.onclick = () => {
            selectedQuality = String(f.abr);
            grid.querySelectorAll('.qbtn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        };
        grid.appendChild(b);
    });
    document.getElementById('qualitySection').style.display = 'block';
}

/* ── Download ── */
// mode: 'structured' (ZIP with covers) | 'flat' (MP3s only)
function handleDownload(mode) {
    // If already downloading, act as cancel
    if (isDownloading) {
        if (activeEvt) { activeEvt.close(); activeEvt = null; }
        isDownloading = false;
        lockAll(false);
        resetDownloadBtnLabels();
        document.getElementById('progressSection').style.display = 'none';
        toast('Cancelled.', 'error');
        return;
    }

    const url = getUrl(); if (!url) return;

    isDownloading = true;
    lockAll(true);

    // Keep active button enabled as Cancel, dim the other
    const activeBtn = mode === 'structured' ? 'btnDownloadZip' : 'btnDownloadFlat';
    const otherBtn  = mode === 'structured' ? 'btnDownloadFlat' : 'btnDownloadZip';
    document.getElementById(activeBtn).disabled = false;
    document.getElementById(activeBtn).querySelector('.lbl').textContent = '✕ Cancel';
    document.getElementById(otherBtn).disabled = true;

    const progSection  = document.getElementById('progressSection');
    const progBar      = document.getElementById('progBar');
    const progPct      = document.getElementById('progPct');
    const progLabel    = document.getElementById('progLabel');
    const progDetail   = document.getElementById('progDetail');
    const warningsLog  = document.getElementById('warningsLog');
    const trackSection = document.getElementById('trackSection');

    progSection.style.display  = 'block';
    trackSection.style.display = 'none';
    warningsLog.style.display  = 'none';
    warningsLog.innerHTML      = '';
    progBar.style.width        = '0%';
    progPct.textContent        = '0%';
    progLabel.textContent      = mode === 'flat' ? 'Downloading MP3s…' : 'Downloading…';
    progDetail.textContent     = 'Starting…';

    const endpoint = mode === 'flat' ? '/download-flat' : '/download-progress';
    const evtSrc   = new EventSource(
        `${endpoint}?url=${encodeURIComponent(url)}&quality=${encodeURIComponent(selectedQuality)}`
    );
    activeEvt = evtSrc;

    evtSrc.onmessage = e => {
        let d;
        try { d = JSON.parse(e.data); } catch { return; }

        if (d.error) {
            toast(d.message || 'Download failed.', 'error');
            cleanup(false); return;
        }

        if (d.warning) {
            warningsLog.style.display = 'block';
            const p = document.createElement('p');
            p.textContent = '⚠ ' + d.message;
            warningsLog.appendChild(p);
            return;
        }

        if (d.done) {
            progBar.style.width    = '100%';
            progPct.textContent    = '100%';
            progLabel.textContent  = 'Done';
            progDetail.textContent = `${d.trackCount} track(s) ready`;

            // Update or create session
            if (!currentSession || currentSession.sessionId !== d.sessionId) {
                currentSession = {
                    sessionId:   d.sessionId,
                    albumName:   d.albumName,
                    tracks:      d.tracks || [],
                    fileName:    null,
                    flatFileName: null
                };
            }
            if (d.mode === 'structured') currentSession.fileName     = d.fileName;
            if (d.mode === 'flat')       currentSession.flatFileName  = d.fileName;
            currentSession.lastMode = d.mode;

            renderTrackList(currentSession, d.mode);
            toast('Download complete.', 'success');
            cleanup(true);
            return;
        }

        const pct = parseFloat(d.percent) || 0;
        progBar.style.width  = pct + '%';
        progPct.textContent  = pct.toFixed(1) + '%';
        if (d.title)   progLabel.textContent  = d.title;
        if (d.current) progDetail.textContent = `Track ${d.current} of ${d.total}`;
        if (d.status === 'fetching') progDetail.textContent = d.message || 'Fetching…';
    };

    evtSrc.onerror = () => {
        if (isDownloading) { toast('Connection lost. Please retry.', 'error'); cleanup(false); }
    };
}

function resetDownloadBtnLabels() {
    const z = document.getElementById('btnDownloadZip');
    const f = document.getElementById('btnDownloadFlat');
    if (z) z.querySelector('.lbl').textContent = '↓ ZIP with Covers';
    if (f) f.querySelector('.lbl').textContent = '↓ MP3 Files Only';
}

function cleanup(success) {
    if (activeEvt) { activeEvt.close(); activeEvt = null; }
    isDownloading = false;
    lockAll(false);
    resetDownloadBtnLabels();
    if (!success) document.getElementById('progressSection').style.display = 'none';
}

/* ── Track list ── */
function renderTrackList(session, mode) {
    const section = document.getElementById('trackSection');
    const list    = document.getElementById('trackList');
    const heading = document.getElementById('trackHeading');
    const btnZip  = document.getElementById('btnZip');
    const btnAlt  = document.getElementById('btnZipAlt');

    heading.textContent = `${session.albumName} — ${session.tracks.length} track${session.tracks.length !== 1 ? 's' : ''}`;

    // Primary ZIP button = the one just downloaded
    if (mode === 'structured' && session.fileName) {
        btnZip.textContent = '↓ Download ZIP';
        btnZip.onclick = downloadZip;
        btnZip.style.display = '';
    } else if (mode === 'flat' && session.flatFileName) {
        btnZip.textContent = '↓ Download MP3s ZIP';
        btnZip.onclick = downloadFlatZip;
        btnZip.style.display = '';
    }

    // Alt button: show the OTHER type if it also exists
    btnAlt.style.display = 'none';
    if (session.fileName && session.flatFileName) {
        if (mode === 'structured') {
            btnAlt.textContent = '↓ MP3s ZIP';
            btnAlt.onclick = downloadFlatZip;
        } else {
            btnAlt.textContent = '↓ Full ZIP';
            btnAlt.onclick = downloadZip;
        }
        btnAlt.style.display = '';
    }

    list.innerHTML = '';
    session.tracks.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'track-item';

        const coverHtml = t.hasCover
            ? `<div class="track-cover"><img src="/cover/${session.sessionId}/${i}" alt="" onerror="this.parentElement.textContent='♪'"></div>`
            : `<div class="track-cover">♪</div>`;

        row.innerHTML = `
            <span class="track-num">${esc(t.trackNum)}</span>
            ${coverHtml}
            <div class="track-info">
                <div class="track-name">${esc(t.title)}</div>
                <div class="track-meta">${esc(t.artist)}</div>
            </div>
            <span class="track-dur">${esc(t.durationFmt)}</span>
            <button class="btn-dl" onclick="downloadSong(${i})">↓ MP3</button>
        `;
        list.appendChild(row);
    });

    section.style.display = 'block';
}

/* ── Individual song download ── */
function downloadSong(trackIndex) {
    if (!currentSession) return;
    const t = currentSession.tracks[trackIndex];
    if (!t) return;
    const a = document.createElement('a');
    a.href     = `/song/${encodeURIComponent(currentSession.sessionId)}/${trackIndex}`;
    a.download = t.mp3Name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast(`Downloading: ${t.title}`);
}

/* ── Full ZIP download (structured) ── */
function downloadZip() {
    if (!currentSession || !currentSession.fileName) return;
    const a = document.createElement('a');
    a.href     = `/file/${encodeURIComponent(currentSession.fileName)}`;
    a.download = currentSession.fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ZIP…');
}

/* ── Flat ZIP download (MP3s only) ── */
function downloadFlatZip() {
    if (!currentSession || !currentSession.flatFileName) return;
    const a = document.createElement('a');
    a.href     = `/file/${encodeURIComponent(currentSession.flatFileName)}`;
    a.download = currentSession.flatFileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading MP3s ZIP…');
}

/* ── Enter key → preview ── */
document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handlePreview();
});
</script>
